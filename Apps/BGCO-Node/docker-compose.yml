name: public-pool-bgcoin
services:
  app:
    cpu_shares: 90
    container_name: Node-BGCO
    hostname: Node-BGCO
    build: .
    image: pool-node-bgco:latest
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: '2'
    restart: unless-stopped
    volumes:
    - type: bind
      source: /media/ZimaOS-HD/nodes/bgco
      target: /root/.bgco
      bind:
        create_host_path: true
    ports:
    - target: 9057
      published: '9057'
      protocol: tcp
    - target: 7057
      published: '7057'
      protocol: tcp
    - target: 8801
      published: '8801'
      protocol: tcp
    command:
    - bgcod
    - -printtoconsole
    - -server
    - -prune=550
    - -wallet=default
    - -zmqpubhashblock=tcp://0.0.0.0:7057
    - -rpcbind=0.0.0.0
    - -rpcport=9057
    - -rpcallowip=0.0.0.0/0
    - -rpcuser=pooluser
    - -rpcpassword=poolpassword
    labels:
      icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/bgco.png
    networks:
    - pool_network
    - default
    privileged: false
networks:
  default:
    name: public-pool-bgcoin_default
  pool_network:
    external: true
x-casaos:
  architectures:
  - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  developer: public-pool-btc.ru
  description:
    en_us: 'BGCoin (BGCO) full node with RPC+ZMQ. Pruned. Data: /media/ZimaOS-HD/nodes/bgco. Ports: P2P 8801, RPC 9057, ZMQ 7057.'
  hostname: ''
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/bgco.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/bgco.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9057'
  scheme: http
  store_app_id: public-pool-node-bgco
  tagline:
    en_us: 'BGCoin (BGCO) Node'
  title:
    custom: 'BGCoin (BGCO) Node'
    en_us: 'BGCoin (BGCO) Node'
