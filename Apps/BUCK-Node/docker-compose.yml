name: public-pool-buck
services:
  app:
    cpu_shares: 90
    container_name: Node-BUCK
    hostname: Node-BUCK
    image: komodoplatform/komodo:latest
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: '2'
    restart: unless-stopped
    volumes:
    - type: bind
      source: /media/ZimaOS-HD/nodes/buck
      target: /root/.komodo/BUCK
      bind:
        create_host_path: true
    ports:
    - target: 9036
      published: '9036'
      protocol: tcp
    - target: 7036
      published: '7036'
      protocol: tcp
    - target: 7774
      published: '7774'
      protocol: tcp
    command:
    - komodod
    - -printtoconsole
    - -server
    - -prune=550
    - -ac_name=BUCK
    - -zmqpubhashblock=tcp://0.0.0.0:7036
    - -rpcbind=0.0.0.0
    - -rpcport=9036
    - -rpcallowip=0.0.0.0/0
    - -rpcuser=pooluser
    - -rpcpassword=poolpassword
    labels:
      icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/buck.png
    networks:
    - pool_network
    - default
    privileged: false
networks:
  default:
    name: public-pool-buck_default
  pool_network:
    external: true
x-casaos:
  architectures:
  - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  developer: public-pool-btc.ru
  description:
    en_us: 'Buck (BUCK) full node with RPC+ZMQ. Pruned. Data: /media/ZimaOS-HD/nodes/buck. Ports: P2P 7774, RPC 9036, ZMQ 7036.'
  hostname: ''
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/buck.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/buck.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9036'
  scheme: http
  store_app_id: public-pool-node-buck
  tagline:
    en_us: 'Buck (BUCK) Node'
  title:
    custom: 'Buck (BUCK) Node'
    en_us: 'Buck (BUCK) Node'
