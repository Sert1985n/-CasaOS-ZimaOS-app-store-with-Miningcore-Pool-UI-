# Вариант с локальными файлами (без wget) — для сервера
name: molepool-web-ui
services:
  app:
    container_name: Molepool-Web-UI
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "82:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/usr/share/nginx/html:ro
    networks:
      - pool_network
      - default
networks:
  pool_network:
    external: true
  default:
    name: molepool-web-ui_default
