name: molepool-web-ui
services:
  app:
    container_name: Molepool-Web-UI
    image: alpine:3.19
    restart: unless-stopped
    ports:
      - "82:80"
    command: >
      sh -c 'apk add --no-cache nginx wget
      && B=https://raw.githubusercontent.com/Sert1985n/-CasaOS-ZimaOS-app-store-with-Miningcore-Pool-UI-/main/Apps/Web-UI-Molepool
      && mkdir -p /usr/share/nginx/html /run/nginx /etc/nginx/conf.d
      && wget -q $$B/nginx.conf -O /etc/nginx/nginx.conf
      && wget -q $$B/www/index.html -O /usr/share/nginx/html/index.html
      && wget -q $$B/www/app.js -O /usr/share/nginx/html/app.js
      && wget -q $$B/www/site.css -O /usr/share/nginx/html/site.css
      && exec nginx -g "daemon off;"'
    networks:
      - pool_network
      - default
    dns:
      - 8.8.8.8
      - 8.8.4.4
networks:
  pool_network:
    external: true
  default:
    name: molepool-web-ui_default
x-casaos:
  architectures:
    - amd64
    - arm
    - arm64
  author: public-pool-btc.ru
  category: Miningcore Pool UI
  description:
    en_us: Панель molepool.com. Pool | Algorithm | Miners | Hashrate | Network Diff | Price | Block Reward | Min Payout | Pool Fee 1.5%. Порт 82. pool_network + Miningcore.
  developer: public-pool-btc.ru
  icon: https://raw.githubusercontent.com/oliverw/miningcore/master/logo.png
  thumbnail: https://raw.githubusercontent.com/oliverw/miningcore/master/logo.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '82'
  scheme: http
  store_app_id: molepool-web-ui
  tagline:
    en_us: Molepool — Solo Mining Dashboard
  title:
    custom: Molepool
    en_us: Molepool
