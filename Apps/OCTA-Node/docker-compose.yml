name: public-pool-btc.ru
services:
  app:
    cpu_shares: 90
    container_name: Node-OCTA
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    image: alpine:3.20
    command:
    - sh
    - -lc
    - echo 'Skeleton container for OCTA. Replace image/command with real node daemon.'
      && sleep infinity
    ports:
    - target: 7043
      published: '7043'
      protocol: tcp
    - target: 9043
      published: '9043'
      protocol: tcp
    networks:
    - pool_network
    - default

networks:
  default:
    name: public-pool-btc.ru_default
  pool_network:
    external: true

x-casaos:
  architectures:
  - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  description:
    en_us: Skeleton for OctaSpace (OCTA). EVM chain. Build from octaspace/orc. RPC 8547. No standalone node image.
  developer: public-pool-btc.ru
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/eth.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/eth.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9043'
  scheme: http
  store_app_id: public-pool-node-octa
  tagline:
    en_us: OCTA Node (skeleton)
  title:
    custom: OctaSpace (OCTA) Node
    en_us: OctaSpace (OCTA) Node
