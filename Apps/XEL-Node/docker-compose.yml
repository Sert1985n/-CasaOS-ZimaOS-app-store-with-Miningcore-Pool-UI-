name: public-pool-btc.ru
services:
  app:
    cpu_shares: 90
    container_name: Node-XEL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    image: alpine:3.20
    command:
    - sh
    - -lc
    - echo 'Skeleton container for XEL. Replace image/command with real node daemon.'
      && sleep infinity
    ports:
    - target: 7042
      published: '7042'
      protocol: tcp
    - target: 9042
      published: '9042'
      protocol: tcp
    networks:
    - pool_network
    - default

networks:
  default:
    name: public-pool-btc.ru_default
  pool_network:
    external: true

x-casaos:
  architectures:
  - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  description:
    en_us: Skeleton node app for Elastic (XEL). Replace container image with real
      daemon.
  developer: public-pool-btc.ru
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/xel.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/xel.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9042'
  scheme: http
  store_app_id: public-pool-node-xel
  tagline:
    en_us: XEL Node (skeleton)
  title:
    custom: Elastic (XEL) Node
    en_us: Elastic (XEL) Node
