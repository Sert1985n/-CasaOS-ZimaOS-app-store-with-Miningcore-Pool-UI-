# Build ZIP — проверка + сборка
name: release zip

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Проверка name в YAML
        run: |
          for f in $(find . -type f \( -name "docker-compose.yaml" -o -name "docker-compose.yml" \) 2>/dev/null); do
            grep -qE '^name:[[:space:]]+[a-z0-9_-]+[[:space:]]*$' "$f" || { echo "Ошибка: $f"; exit 1; }
          done

      - name: Build ZIP
        run: |
          rm -rf /tmp/build
          mkdir -p /tmp/build/sysroot/var/lib/casaos/appstore/default.new
          if [ -d build ] && [ -n "$(ls -A build 2>/dev/null)" ]; then
            cp -rv build/* /tmp/build/
          else
            mkdir -p /tmp/build/scripts
          fi
          cp -rv Apps /tmp/build/sysroot/var/lib/casaos/appstore/default.new/
          cp -v category-list.json /tmp/build/sysroot/var/lib/casaos/appstore/default.new/
          [ -f featured-apps.json ] && cp -v featured-apps.json /tmp/build/sysroot/var/lib/casaos/appstore/default.new/ || echo '[]' > /tmp/build/sysroot/var/lib/casaos/appstore/default.new/featured-apps.json
          [ -f recommend-list.json ] && cp -v recommend-list.json /tmp/build/sysroot/var/lib/casaos/appstore/default.new/ || echo '[]' > /tmp/build/sysroot/var/lib/casaos/appstore/default.new/recommend-list.json
          cp -v README.md /tmp/build/sysroot/var/lib/casaos/appstore/default.new/
          cd /tmp && zip -r main.zip build
          ls -lh /tmp/main.zip

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: appstore-zip
          path: /tmp/main.zip
