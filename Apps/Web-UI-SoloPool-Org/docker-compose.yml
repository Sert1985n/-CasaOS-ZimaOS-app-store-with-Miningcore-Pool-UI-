name: solopool-web-ui
services:
  app:
    container_name: SoloPool-Web-UI
    image: alpine:3.19
    restart: unless-stopped
    ports:
      - "84:80"
    command: >
      sh -c 'apk add --no-cache nginx wget
      && B=https://raw.githubusercontent.com/Sert1985n/-CasaOS-ZimaOS-app-store-with-Miningcore-Pool-UI-/main/Apps/Web-UI-SoloPool-Org
      && mkdir -p /usr/share/nginx/html /run/nginx /etc/nginx/conf.d
      && wget -q $$B/nginx.conf -O /etc/nginx/nginx.conf
      && wget -q $$B/www/index.html -O /usr/share/nginx/html/index.html
      && wget -q $$B/www/app.js -O /usr/share/nginx/html/app.js
      && wget -q $$B/www/site.css -O /usr/share/nginx/html/site.css
      && exec nginx -g "daemon off;"'
    networks:
      - pool_network
      - default
    dns:
      - 8.8.8.8
      - 8.8.4.4
networks:
  pool_network:
    external: true
  default:
    name: solopool-web-ui_default
x-casaos:
  architectures:
    - amd64
    - arm
    - arm64
  author: public-pool-btc.ru
  category: Miningcore Pool UI
  description:
    en_us: Панель solopool.org. Pool Hashrate | Blocks | Luck | Network Diff | Price | Block Reward | Min Payout | Pool Fee 1.5%. Порт 84. pool_network + Miningcore.
  developer: public-pool-btc.ru
  icon: https://raw.githubusercontent.com/Sert1985n/-CasaOS-ZimaOS-app-store-with-Miningcore-Pool-UI-/main/Apps/img/icon-solopool-org.png
  thumbnail: https://raw.githubusercontent.com/Sert1985n/-CasaOS-ZimaOS-app-store-with-Miningcore-Pool-UI-/main/Apps/img/icon-solopool-org.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '84'
  scheme: http
  store_app_id: solopool-web-ui
  tagline:
    en_us: SoloPool — Solo Mining Pools For Professional Miners
  title:
    custom: SoloPool
    en_us: SoloPool
