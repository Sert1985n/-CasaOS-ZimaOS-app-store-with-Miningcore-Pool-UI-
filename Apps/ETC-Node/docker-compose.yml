name: public-pool-btc.ru
services:
  app:
    cpu_shares: 90
    container_name: Node-ETC
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    image: alpine:3.20
    command:
    - sh
    - -lc
    - echo 'Skeleton container for ETC. Replace image/command with real node daemon.'
      && sleep infinity
    ports:
    - target: 7022
      published: '7022'
      protocol: tcp
    - target: 9022
      published: '9022'
      protocol: tcp
    networks:
    - pool_network
    - default

networks:
  default:
    name: public-pool-btc.ru_default
  pool_network:
    external: true

x-casaos:
  architectures:
  - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  description:
    en_us: Skeleton node app for Ethereum Classic (ETC). Replace container image with
      real daemon.
  developer: public-pool-btc.ru
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/etc.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/etc.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9022'
  scheme: http
  store_app_id: public-pool-node-etc
  tagline:
    en_us: ETC Node (skeleton)
  title:
    custom: Ethereum Classic (ETC) Node
    en_us: Ethereum Classic (ETC) Node
