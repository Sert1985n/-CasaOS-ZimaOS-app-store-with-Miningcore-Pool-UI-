# Build — проверка compose, нод, панелей, портов, Miningcore
name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Проверка name в YAML [a-z0-9_-]
        run: |
          for f in $(find . -type f \( -name "docker-compose.yaml" -o -name "docker-compose.yml" \) 2>/dev/null); do
            if ! grep -qE '^name:[[:space:]]+[a-z0-9_-]+[[:space:]]*$' "$f" 2>/dev/null; then
              echo "Ошибка name в $f — только [a-z0-9_-]"
              exit 1
            fi
          done
          echo "OK: все name валидны"

      - name: CasaOS validator
        uses: robinraju/release-downloader@v1.9
        with:
          repository: IceWhaleTech/CasaOS-AppManagement
          latest: true
          fileName: linux-amd64-casaos-app-management-validator-*.tar.gz

      - name: Валидация docker-compose
        run: |
          tar zxf linux-amd64-casaos-app-management-validator-*.tar.gz
          chmod +x build/sysroot/usr/bin/casaos-app-management-validator
          for f in $(find . -type f \( -name "docker-compose.yaml" -o -name "docker-compose.yml" \) 2>/dev/null); do
            echo ">>> $f"
            build/sysroot/usr/bin/casaos-app-management-validator "$f" || exit 1
          done
          echo "OK: все compose прошли CasaOS validator"

      - name: Miningcore + панели + порты + контейнеры
        run: |
          echo "=== MININGCORE ==="
          echo "Контейнеры: miningcore, miningcore-webui"
          echo "Порты: 81 (Pool UI), 4000 (API), 6001-6029 (stratum)"
          echo ""
          echo "=== ПАНЕЛИ ==="
          echo "81: miningcore-webui (Pool UI)"
          echo "82: Molepool-Web-UI"
          echo "83: Solo-Pool-Dashboard-UI"
          echo "84: SoloPool-Web-UI"
          echo "85: Miningcore-Web-UI (Pool Configuration)"
          echo ""
          echo "=== НОДЫ МОНЕТ ==="
          for f in Apps/*-Node/docker-compose.yml Apps/*node*/docker-compose.yml 2>/dev/null; do
            [ -f "$f" ] && grep -E "container_name:|port_map:" "$f" 2>/dev/null | head -2
          done | sort -u

      - name: Создание build
        run: |
          rm -rf /tmp/build
          mkdir -p /tmp/build/sysroot/var/lib/casaos/appstore/default.new
          if [ -d build ] && [ -n "$(ls -A build 2>/dev/null)" ]; then
            cp -rv build/* /tmp/build/
          else
            mkdir -p /tmp/build/scripts
          fi
          cp -rv Apps /tmp/build/sysroot/var/lib/casaos/appstore/default.new/
          cp -v category-list.json /tmp/build/sysroot/var/lib/casaos/appstore/default.new/
          [ -f recommend-list.json ] && cp -v recommend-list.json /tmp/build/sysroot/var/lib/casaos/appstore/default.new/ || echo '[]' > /tmp/build/sysroot/var/lib/casaos/appstore/default.new/recommend-list.json
          [ -f featured-apps.json ] && cp -v featured-apps.json /tmp/build/sysroot/var/lib/casaos/appstore/default.new/ || echo '[]' > /tmp/build/sysroot/var/lib/casaos/appstore/default.new/featured-apps.json
          cp -v README.md /tmp/build/sysroot/var/lib/casaos/appstore/default.new/
          cd /tmp && tar zcvf linux-all-appstore-build.tar.gz build
          ls -lh /tmp/linux-all-appstore-build.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appstore-build
          path: /tmp/linux-all-appstore-build.tar.gz
