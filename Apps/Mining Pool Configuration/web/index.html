<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Mining Pool Configuration</title>
  <link rel="stylesheet" href="site.css"/>
</head>
<body>
  <header class="bar">
    <div class="brand">
      <strong>Mining Pool Configuration</strong>
      <span class="muted">ВКЛ/ВЫКЛ нод, pool wallet, fee wallet, fee % • config.json</span>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Настройки по умолчанию</h2>
      <div class="grid">
        <label>Кошелёк майнера (по умолчанию)
          <input id="wallet" placeholder="вставь адрес" />
        </label>
        <label>Кошелёк комиссии пула (1.5%)
          <input id="feeWallet" placeholder="вставь адрес" />
        </label>
        <label>Мин. выплата (для монеты, по умолчанию 0.001)
          <input id="minimumPayment" type="number" step="0.000001" min="0" placeholder="0.001" />
        </label>
      </div>
      <label class="chk"><input type="checkbox" id="doRestart" checked/> Делать docker restart miningcore</label>
    </section>

    <section class="card">
      <h2>Пулы — ВКЛ/ВЫКЛ, Pool Wallet, Fee Wallet, Fee %</h2>
      <p class="muted">Wallet создаётся скриптом setup-wallet-for-node.sh при установке ноды</p>
      <div id="coins" class="coins"></div>
    </section>

    <section class="card">
      <h2>Лог</h2>
      <pre id="log" class="log"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
