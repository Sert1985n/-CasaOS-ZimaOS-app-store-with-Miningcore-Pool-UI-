name: public-pool-btc.ru
services:
  app:
    cpu_shares: 90
    container_name: Node-ETC
    hostname: Node-ETC
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: '2'
    image: etclabscore/core-geth:latest
    command:
      - geth
      - --classic
      - --http
      - --http.port=8545
      - --http.addr=0.0.0.0
      - --http.api=eth,net,web3
      - --http.corsdomain=*
      - --http.vhosts=*
    ports:
      - target: 8545
        published: '8545'
        protocol: tcp
      - target: 30303
        published: '30303'
        protocol: tcp
    volumes:
      - type: bind
        source: /media/ZimaOS-HD/nodes/etc
        target: /root
        bind:
          create_host_path: true
    restart: unless-stopped
    networks:
      - pool_network
      - default

networks:
  default:
    name: public-pool-btc.ru_default
  pool_network:
    external: true

x-casaos:
  architectures:
    - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  description:
    en_us: Ethereum Classic full node for Miningcore pool. RPC 8545. Data at /media/ZimaOS-HD/nodes/etc
  developer: public-pool-btc.ru
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/etc.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/etc.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '8545'
  scheme: http
  store_app_id: public-pool-node-etc
  tagline:
    en_us: Ethereum Classic (ETC) Node
  title:
    custom: Ethereum Classic (ETC) Node
    en_us: Ethereum Classic (ETC) Node
