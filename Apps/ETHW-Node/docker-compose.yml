name: public-pool-btc.ru
services:
  app:
    cpu_shares: 90
    container_name: Node-ETHW
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    image: alpine:3.20
    command:
    - sh
    - -lc
    - echo 'Skeleton container for ETHW. Replace image/command with real node daemon.'
      && sleep infinity
    ports:
    - target: 7023
      published: '7023'
      protocol: tcp
    - target: 9023
      published: '9023'
      protocol: tcp
    networks:
    - pool_network
    - default

networks:
  default:
    name: public-pool-btc.ru_default
  pool_network:
    external: true

x-casaos:
  architectures:
  - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  description:
    en_us: Skeleton for EthereumPoW (ETHW). No official Docker image. Build from ethereumpow/go-ethereum or use custom image. RPC 8546.
  developer: public-pool-btc.ru
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/eth.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/eth.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9023'
  scheme: http
  store_app_id: public-pool-node-ethw
  tagline:
    en_us: ETHW Node (skeleton)
  title:
    custom: EthereumPoW (ETHW) Node
    en_us: EthereumPoW (ETHW) Node
