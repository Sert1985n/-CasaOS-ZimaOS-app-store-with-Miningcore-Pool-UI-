name: public-pool-coincollect
services:
  app:
    cpu_shares: 90
    container_name: Node-CLC
    hostname: Node-CLC
    image: komodoplatform/komodo:latest
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: '2'
    restart: unless-stopped
    volumes:
    - type: bind
      source: /media/ZimaOS-HD/nodes/clc
      target: /root/.komodo/CLC
      bind:
        create_host_path: true
    ports:
    - target: 9035
      published: '9035'
      protocol: tcp
    - target: 7035
      published: '7035'
      protocol: tcp
    - target: 7773
      published: '7773'
      protocol: tcp
    command:
    - komodod
    - -printtoconsole
    - -server
    - -prune=550
    - -ac_name=CLC
    - -zmqpubhashblock=tcp://0.0.0.0:7035
    - -rpcbind=0.0.0.0
    - -rpcport=9035
    - -rpcallowip=0.0.0.0/0
    - -rpcuser=pooluser
    - -rpcpassword=poolpassword
    labels:
      icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/clc.png
    networks:
    - pool_network
    - default
    privileged: false
networks:
  default:
    name: public-pool-coincollect_default
  pool_network:
    external: true
x-casaos:
  architectures:
  - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  developer: public-pool-btc.ru
  description:
    en_us: 'CoinCollect (CLC) full node with RPC+ZMQ. Pruned. Data: /media/ZimaOS-HD/nodes/clc. Ports: P2P 7773, RPC 9035, ZMQ 7035.'
  hostname: ''
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/clc.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/clc.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9035'
  scheme: http
  store_app_id: public-pool-node-clc
  tagline:
    en_us: 'CoinCollect (CLC) Node'
  title:
    custom: 'CoinCollect (CLC) Node'
    en_us: 'CoinCollect (CLC) Node'
