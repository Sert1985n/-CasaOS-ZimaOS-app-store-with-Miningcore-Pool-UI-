name: public-pool-bitcoin-silver
services:
  app:
    cpu_shares: 90
    container_name: Node-BTCS
    hostname: Node-BTCS
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: '2'
    image: theretromike/nodes:bitcoinsilver
    command:
      - bitcoinsilverd
      - -printtoconsole
      - -server
      - -prune=550
      - -wallet=default
      - -zmqpubhashblock=tcp://0.0.0.0:7015
      - -rpcbind=0.0.0.0
      - -rpcport=9015
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=pooluser
      - -rpcpassword=poolpassword
      - -addnode=89.163.242.248:10566
      - -addnode=95.141.241.26:10566
    ports:
      - target: 9015
        published: '9015'
        protocol: tcp
      - target: 7015
        published: '7015'
        protocol: tcp
    volumes:
      - type: bind
        source: /media/ZimaOS-HD/nodes/btcs
        target: /root/.bitcoinsilver
        bind:
          create_host_path: true
    restart: unless-stopped
    networks:
      - pool_network
      - default

networks:
  default:
    name: public-pool-btc.ru_default
  pool_network:
    external: true

x-casaos:
  architectures:
    - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  description:
    en_us: Bitcoin Silver full node. RPC 9015, ZMQ 7015. Data at /media/ZimaOS-HD/nodes/btcs. Optional — Miningcore may need custom coin def.
  developer: public-pool-btc.ru
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/btc.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/btc.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9015'
  scheme: http
  store_app_id: public-pool-node-btcs
  tagline:
    en_us: Bitcoin Silver (BTCS) Node (optional)
  title:
    custom: Bitcoin Silver (BTCS) Node
    en_us: Bitcoin Silver (BTCS) Node
