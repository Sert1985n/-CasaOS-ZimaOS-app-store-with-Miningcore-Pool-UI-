name: public-pool-btc.ru
services:
  app:
    cpu_shares: 90
    container_name: Node-ZEC
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    image: alpine:3.20
    command:
    - sh
    - -lc
    - echo 'Skeleton container for ZEC. Replace image/command with real node daemon.'
      && sleep infinity
    ports:
    - target: 7032
      published: '7032'
      protocol: tcp
    - target: 9032
      published: '9032'
      protocol: tcp
    networks:
    - pool_network
    - default

networks:
  default:
    name: public-pool-btc.ru_default
  pool_network:
    external: true

x-casaos:
  architectures:
  - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  description:
    en_us: Skeleton node app for Zcash (ZEC). Replace container image with real daemon.
  developer: public-pool-btc.ru
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/zec.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/zec.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9032'
  scheme: http
  store_app_id: public-pool-node-zec
  tagline:
    en_us: ZEC Node (skeleton)
  title:
    custom: Zcash (ZEC) Node
    en_us: Zcash (ZEC) Node
