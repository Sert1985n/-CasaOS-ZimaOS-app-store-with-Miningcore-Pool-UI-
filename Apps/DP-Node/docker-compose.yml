name: public-pool-digitalprice
services:
  app:
    cpu_shares: 90
    container_name: Node-DP
    hostname: Node-DP
    image: komodoplatform/komodo:latest
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: '2'
    restart: unless-stopped
    volumes:
    - type: bind
      source: /media/ZimaOS-HD/nodes/dp
      target: /root/.komodo/DP
      bind:
        create_host_path: true
    ports:
    - target: 9034
      published: '9034'
      protocol: tcp
    - target: 7034
      published: '7034'
      protocol: tcp
    - target: 7772
      published: '7772'
      protocol: tcp
    command:
    - komodod
    - -printtoconsole
    - -server
    - -prune=550
    - -ac_name=DP
    - -ac_supply=21000000
    - -zmqpubhashblock=tcp://0.0.0.0:7034
    - -rpcbind=0.0.0.0
    - -rpcport=9034
    - -rpcallowip=0.0.0.0/0
    - -rpcuser=pooluser
    - -rpcpassword=poolpassword
    labels:
      icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/dp.png
    networks:
    - pool_network
    - default
    privileged: false
networks:
  default:
    name: public-pool-digitalprice_default
  pool_network:
    external: true
x-casaos:
  architectures:
  - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  developer: public-pool-btc.ru
  description:
    en_us: 'DigitalPrice (DP) full node with RPC+ZMQ. Pruned. Data: /media/ZimaOS-HD/nodes/dp. Ports: P2P 7772, RPC 9034, ZMQ 7034.'
  hostname: ''
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/dp.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/dp.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9034'
  scheme: http
  store_app_id: public-pool-node-dp
  tagline:
    en_us: 'DigitalPrice (DP) Node'
  title:
    custom: 'DigitalPrice (DP) Node'
    en_us: 'DigitalPrice (DP) Node'
