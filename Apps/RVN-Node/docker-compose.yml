name: public-pool-btc.ru
services:
  app:
    cpu_shares: 90
    container_name: Node-RVN
    hostname: Node-RVN
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: '2'
    image: theretromike/nodes:ravencoin
    command:
      - /usr/bin/ravend
      - -printtoconsole
      - -server
      - -prune=550
      - -wallet=default
      - -zmqpubhashblock=tcp://0.0.0.0:7010
      - -rpcbind=0.0.0.0
      - -rpcport=9010
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=pooluser
      - -rpcpassword=poolpassword
    ports:
      - target: 7010
        published: '7010'
        protocol: tcp
      - target: 9010
        published: '9010'
        protocol: tcp
    volumes:
      - type: bind
        source: /media/ZimaOS-HD/nodes/rvn
        target: /root/.raven
        bind:
          create_host_path: true
    restart: unless-stopped
    networks:
      - pool_network
      - default

networks:
  default:
    name: public-pool-btc.ru_default
  pool_network:
    external: true

x-casaos:
  architectures:
    - amd64
  author: public-pool-btc.ru
  category: Cryptocurrency Nodes
  description:
    en_us: Ravencoin full node for Miningcore pool. RPC 9010, ZMQ 7010. Data at /media/ZimaOS-HD/nodes/rvn
  developer: public-pool-btc.ru
  icon: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/rvn.png
  thumbnail: https://cdn.jsdelivr.net/npm/cryptocurrency-icons@0.18.1/128/color/rvn.png
  index: /
  is_uncontrolled: false
  main: app
  port_map: '9010'
  scheme: http
  store_app_id: public-pool-node-rvn
  tagline:
    en_us: Ravencoin (RVN) Node
  title:
    custom: Ravencoin (RVN) Node
    en_us: Ravencoin (RVN) Node
