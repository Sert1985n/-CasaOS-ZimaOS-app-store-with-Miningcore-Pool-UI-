<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pool Configuration — Admin Panel</title>
<link rel="stylesheet" href="site.css"/>
</head>
<body>
<header>
  <div class="hdr">
    <strong>Pool Configuration</strong>
    <span class="muted" id="poolCount"></span>
  </div>
  <div class="hdr-btns">
    <button class="btn btn-warn" onclick="restartMC()">Restart Miningcore</button>
    <button class="btn btn-danger" onclick="restartAll()">Restart All</button>
  </div>
</header>
<main>
  <section id="poolsSection">
    <h2>Pools from config.json</h2>
    <div id="pools"></div>
  </section>
  <section id="addSection">
    <h2>Add New Pool</h2>
    <div class="add-form">
      <input id="addId" placeholder="pool id (e.g. btc)"/>
      <input id="addCoin" placeholder="coin key from coins.json"/>
      <input id="addContainer" placeholder="Node-XXX"/>
      <input id="addRpc" placeholder="RPC port" type="number"/>
      <input id="addZmq" placeholder="ZMQ port" type="number"/>
      <button class="btn btn-ok" onclick="addPool()">Add Pool</button>
    </div>
  </section>
  <section id="availSection">
    <h2>Coins in coins.json not yet in config.json</h2>
    <div id="available"></div>
  </section>
  <section>
    <h2>Log</h2>
    <pre id="log"></pre>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
